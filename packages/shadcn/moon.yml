language: 'typescript'
tags: ['package']
toolchains:
  default: 'bun'

fileGroups:
  sources:
    - 'src/**/*'
  tests:
    - 'tests/**/*'

tasks:
  build:
    command: 'tsc'
    inputs:
      - '@globs(sources)'
    outputs:
      - 'dist'
    deps:
      - '^:build'
  typecheck:
    command: 'tsc --noEmit'
    inputs:
      - '@globs(sources)'
  lint:
    command: 'eslint src/'
    inputs:
      - '@globs(sources)'
  test:
    command: 'bun test'
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
  clean:
    command: 'rm -rf dist'
